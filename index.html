<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorldPixel | Mobile Optimized</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0c0c0d; font-family: 'Consolas', monospace; touch-action: none; user-select: none; }
        :root { --primary: #0f0; --bg: rgba(10, 10, 12, 0.95); }
        canvas { display: block; image-rendering: pixelated; background: #fff; touch-action: none; }
        #hud { position: fixed; top: 10px; left: 10px; right: 10px; pointer-events: none; display: flex; justify-content: space-between; z-index: 100; }
        .panel { background: var(--bg); padding: 8px 12px; border: 1px solid var(--primary); pointer-events: auto; color: var(--primary); border-radius: 4px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: var(--primary); }
        button { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 12px 24px; cursor: pointer; font-family: inherit; margin-top: 20px; text-transform: uppercase; }
        input[type="color"] { border: 1px solid var(--primary); width: 30px; height: 30px; background: none; cursor: pointer; }
        .hidden { display: none !important; }
        #cooldown-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.7); z-index: 1001; }
        #cooldown-bar { width: 0%; height: 100%; background: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>WORLD_PIXEL</h1>
        <p>MOBILE_TOUCH_PROTOCOL: ACTIVE</p>
        <button id="btn-login">Connect</button>
    </div>

    <div id="cooldown-container"><div id="cooldown-bar"></div></div>

    <div id="hud" class="hidden">
        <div class="panel">
            <input type="color" id="colorPicker" value="#000000">
            <span id="coords">X:0 Y:0</span>
        </div>
        <div class="panel"><span id="online-count">0</span> ONLINE</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
            authDomain: "doodle-102.firebaseapp.com",
            projectId: "doodle-102",
            databaseURL: "https://doodle-102-default-rtdb.firebaseio.com",
            storageBucket: "doodle-102.firebasestorage.app",
            appId: "1:296542303637:web:950b3cbe547c6d10f3f29c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const world = document.createElement('canvas');
        const wctx = world.getContext('2d', { alpha: false });

        const WORLD_SIZE = 2000;
        const P_SIZE = 10;
        let zoom = 1.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let currentUser = null, lastDrawTime = 0;
        const COOLDOWN_MS = 1000; 

        world.width = WORLD_SIZE; world.height = WORLD_SIZE;
        wctx.fillStyle = "white"; wctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        document.getElementById('btn-login').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                initWorld();
            }
        });

        function initWorld() {
            db.ref('canvas').on('child_added', draw);
            db.ref('canvas').on('child_changed', draw);
            db.ref('presence').push(true).onDisconnect().remove();
            db.ref('presence').on('value', s => { document.getElementById('online-count').innerText = s.numChildren(); });
        }

        function draw(snap) {
            const d = snap.val();
            if(!d) return;
            wctx.fillStyle = d.color;
            wctx.fillRect(d.x, d.y, 1, 1);
        }

        function sendPixel(x, y) {
            if (!currentUser || Date.now() - lastDrawTime < COOLDOWN_MS) return;
            if (x < 0 || x >= WORLD_SIZE || y < 0 || y >= WORLD_SIZE) return;
            
            const color = document.getElementById('colorPicker').value;
            db.ref('canvas/' + x + '_' + y).set({ 
                x, y, color, uid: currentUser.uid, t: firebase.database.ServerValue.TIMESTAMP 
            });
            lastDrawTime = Date.now();
            updateCooldown();
        }

        function updateCooldown() {
            const bar = document.getElementById('cooldown-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = `width ${COOLDOWN_MS}ms linear`; bar.style.width = '0%'; }, 20);
        }

        // --- ИСПРАВЛЕННОЕ УПРАВЛЕНИЕ ---
        let isDrawing = false, isPanning = false;
        let lastTouchX = 0, lastTouchY = 0, initialHypot = 0;

        function getPos(clientX, clientY) {
            return {
                x: Math.floor(((clientX - offset.x) / zoom) / P_SIZE + WORLD_SIZE/2),
                y: Math.floor(((clientY - offset.y) / zoom) / P_SIZE + WORLD_SIZE/2)
            };
        }

        // Мышь
        canvas.addEventListener('mousedown', e => {
            if(e.button === 0) { isDrawing = true; const p = getPos(e.clientX, e.clientY); sendPixel(p.x, p.y); }
            else isPanning = true;
        });

        // Тач (Телефон)
        canvas.addEventListener('touchstart', e => {
            if(e.touches.length === 1) {
                isDrawing = true;
                const p = getPos(e.touches[0].clientX, e.touches[0].clientY);
                sendPixel(p.x, p.y);
            } else if(e.touches.length === 2) {
                isPanning = true;
                isDrawing = false;
                lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                initialHypot = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            if(isDrawing && e.touches.length === 1) {
                const p = getPos(e.touches[0].clientX, e.touches[0].clientY);
                sendPixel(p.x, p.y);
            } else if(isPanning && e.touches.length === 2) {
                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const currentHypot = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                
                // Перемещение
                offset.x += centerX - lastTouchX;
                offset.y += centerY - lastTouchY;
                
                // Зум
                const zoomFactor = currentHypot / initialHypot;
                zoom = Math.min(Math.max(zoom * zoomFactor, 0.05), 30);
                
                lastTouchX = centerX;
                lastTouchY = centerY;
                initialHypot = currentHypot;
            }
        }, {passive: false});

        window.addEventListener('mousemove', e => {
            if(isDrawing) { const p = getPos(e.clientX, e.clientY); sendPixel(p.x, p.y); }
            if(isPanning) { offset.x += e.movementX; offset.y += e.movementY; }
            const p = getPos(e.clientX, e.clientY);
            document.getElementById('coords').innerText = `X:${p.x} Y:${p.y}`;
        });

        window.onmouseup = window.ontouchend = () => { isDrawing = isPanning = false; };
        window.onwheel = e => { 
            const s = e.deltaY > 0 ? 0.9 : 1.1; 
            zoom = Math.min(Math.max(zoom * s, 0.05), 30); 
        };

        function render() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
            ctx.fillStyle = "#161617"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(zoom * P_SIZE, zoom * P_SIZE);
            ctx.drawImage(world, -WORLD_SIZE/2, -WORLD_SIZE/2);
            ctx.restore();
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
