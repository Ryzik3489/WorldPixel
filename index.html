<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
            font-family: sans-serif; touch-action: none; -webkit-user-select: none; 
        }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: fixed; top: 15px; left: 15px; right: 15px; pointer-events: none; display: flex; justify-content: space-between; z-index: 100; }
        .panel { 
            background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 10px 18px; color: #fff; pointer-events: auto; 
            display: flex; align-items: center; gap: 15px; border-radius: 12px; backdrop-filter: blur(10px);
        }
        #chat-container { position: fixed; bottom: 25px; left: 15px; width: 280px; pointer-events: auto; z-index: 1000; }
        #chat-input { width: 100%; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; padding: 12px; outline: none; border-radius: 12px; }
        .msg { background: rgba(0, 0, 0, 0.6); color: #fff; padding: 6px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 5px; animation: fadeOut 5s forwards; }
        input[type="color"] { width: 30px; height: 30px; border: 1px solid #fff; background: none; border-radius: 6px; }
        #cooldown { position: fixed; bottom: 0; left: 0; height: 4px; background: #00ff00; width: 0%; z-index: 1001; }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="cooldown"></div>
    <div id="ui">
        <div class="panel"><input type="color" id="colorPicker" value="#ffffff"><span id="coords">0, 0</span></div>
        <div class="panel">ОНЛАЙН: <span id="online">1</span></div>
    </div>
    <div id="chat-container"><div id="chat-messages"></div><input type="text" id="chat-input" placeholder="Написать..." maxlength="50"></div>
    <canvas id="canvas"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
        authDomain: "doodle-102.firebaseapp.com",
        databaseURL: "https://doodle-102-default-rtdb.firebaseio.com",
        projectId: "doodle-102",
        storageBucket: "doodle-102.firebasestorage.app",
        messagingSenderId: "296542303637",
        appId: "1:296542303637:web:950b3cbe547c6d10f3f29c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas');
    const wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;
    world.width = world.height = W_SIZE;
    wctx.fillStyle = "#FFFFFF"; wctx.fillRect(0, 0, W_SIZE, W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
    let lastDraw = 0; const CD_TIME = 500;

    // СИНХРОНИЗАЦИЯ
    db.ref('canvas').on('child_added', s => drawToBuffer(s.val()));
    db.ref('canvas').on('child_changed', s => drawToBuffer(s.val()));
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren() || 1);

    function drawToBuffer(p) { if(p) { wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); } }
    
    function sendPixel(x, y) {
        const now = Date.now();
        if(now - lastDraw < CD_TIME || x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;
        lastDraw = now;
        const color = document.getElementById('colorPicker').value;
        db.ref('canvas/' + x + '_' + y).set({ x, y, color });
        const bar = document.getElementById('cooldown');
        bar.style.transition = 'none'; bar.style.width = '100%';
        setTimeout(() => { bar.style.transition = `width ${CD_TIME}ms linear`; bar.style.width = '0%'; }, 20);
    }

    function getP(cx, cy) {
        return {
            x: Math.floor((cx - offset.x) / zoom + W_SIZE/2),
            y: Math.floor((cy - offset.y) / zoom + W_SIZE/2)
        };
    }

    // МЫШЬ
    let isDraw = false, isPan = false;
    window.oncontextmenu = e => e.preventDefault();
    canvas.onmousedown = e => { 
        if(e.button === 0) { isDraw = true; const p = getP(e.clientX, e.clientY); sendPixel(p.x, p.y); } 
        else if(e.button === 2) isPan = true;
    };
    window.onmousemove = e => {
        const p = getP(e.clientX, e.clientY); document.getElementById('coords').innerText = `${p.x}, ${p.y}`;
        if(isDraw) sendPixel(p.x, p.y);
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };

    // МОБИЛЬНОЕ УПРАВЛЕНИЕ (ИСПРАВЛЕНО)
    let lastD = 0, lastM = {x:0, y:0};
    canvas.addEventListener('touchstart', e => {
        if(e.touches.length === 1) {
            isDraw = true; const p = getP(e.touches[0].clientX, e.touches[0].clientY); sendPixel(p.x, p.y);
        } else if(e.touches.length === 2) {
            isPan = true; isDraw = false;
            lastD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            lastM = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        e.preventDefault(); // Теперь не скроллит страницу, а двигает холст
        if(isDraw && e.touches.length === 1) {
            const p = getP(e.touches[0].clientX, e.touches[0].clientY); sendPixel(p.x, p.y);
        } else if(isPan && e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const m = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
            offset.x += m.x - lastM.x; offset.y += m.y - lastM.y;
            zoom *= (d / lastD); zoom = Math.min(Math.max(zoom, 0.1), 80);
            lastD = d; lastM = m;
        }
    }, {passive: false});

    window.onmouseup = window.ontouchend = () => { isDraw = isPan = false; };
    window.onwheel = e => { zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.1), 80); };

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(offset.x, offset.y); ctx.scale(zoom, zoom);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        if(zoom > 20) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 0.02;
            for(let x=0; x<=W_SIZE; x++) { ctx.moveTo(x-W_SIZE/2, -W_SIZE/2); ctx.lineTo(x-W_SIZE/2, W_SIZE/2); }
            for(let y=0; y<=W_SIZE; y++) { ctx.moveTo(-W_SIZE/2, y-W_SIZE/2); ctx.lineTo(W_SIZE/2, y-W_SIZE/2); }
            ctx.stroke();
        }
        ctx.restore(); requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
