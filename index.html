<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #fff; 
            font-family: sans-serif; touch-action: none; -webkit-user-select: none; 
        }
        canvas { display: block; image-rendering: pixelated; }

        /* НОВАЯ ПАНЕЛЬ С ЦВЕТАМИ */
        #ui-top { position: fixed; top: 15px; left: 10px; right: 10px; pointer-events: none; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .info-bar { display: flex; justify-content: space-between; pointer-events: none; }
        .panel { 
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); 
            padding: 8px 15px; border-radius: 12px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: auto; font-size: 13px; font-weight: bold;
        }

        .palette { 
            display: flex; gap: 8px; background: rgba(255, 255, 255, 0.9); 
            padding: 10px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1);
            pointer-events: auto; overflow-x: auto; max-width: 100%; backdrop-filter: blur(10px);
        }
        .color-dot { 
            min-width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); 
            cursor: pointer; transition: transform 0.1s; flex-shrink: 0;
        }
        .color-dot.active { transform: scale(1.2); border-color: #000; box-shadow: 0 0 5px rgba(0,0,0,0.3); }

        /* ЧАТ */
        #chat-container { position: fixed; bottom: 25px; left: 10px; width: calc(100% - 20px); max-width: 280px; pointer-events: auto; z-index: 1000; }
        #chat-input { width: 100%; background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.1); padding: 12px; border-radius: 12px; outline: none; box-sizing: border-box; }
        #chat-messages { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        .msg { background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(0,0,0,0.05); animation: fO 5s forwards; width: fit-content; }
        
        #cooldown { position: fixed; bottom: 0; left: 0; height: 4px; background: #ff3333; width: 0%; z-index: 1001; }
        @keyframes fO { 0%, 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-5px); } }
    </style>
</head>
<body>
    <div id="cooldown"></div>
    <div id="ui-top">
        <div class="info-bar">
            <div class="panel" id="coords">0, 0</div>
            <div class="panel">ОНЛАЙН: <span id="online">1</span></div>
        </div>
        <div class="palette" id="palette">
            </div>
    </div>
    <div id="chat-container"><div id="chat-messages"></div><input type="text" id="chat-input" placeholder="Чат..." maxlength="50"></div>
    <canvas id="canvas"></canvas>

<script>
    const config = { apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM", databaseURL: "https://doodle-102-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas'), wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;
    world.width = world.height = W_SIZE; wctx.fillStyle = "#fff"; wctx.fillRect(0,0,W_SIZE,W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 }, lastDraw = 0, selectedColor = "#ff0000";
    const colors = ["#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff", "#000000", "#ffffff", "#ff8800", "#8800ff"];

    // ГЕНЕРАЦИЯ ПАЛИТРЫ
    const paletteEl = document.getElementById('palette');
    colors.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-dot' + (c === selectedColor ? ' active' : '');
        div.style.background = c;
        div.onclick = () => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            div.classList.add('active'); selectedColor = c;
        };
        paletteEl.appendChild(div);
    });

    db.ref('canvas').on('child_added', s => { const p = s.val(); if(p){ wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); } });
    db.ref('canvas').on('child_changed', s => { const p = s.val(); if(p){ wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); } });
    
    const myPres = db.ref('presence').push();
    db.ref('.info/connected').on('value', s => { if(s.val()){ myPres.set(true); myPres.onDisconnect().remove(); } });
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren() || 1);

    const chatIn = document.getElementById('chat-input'), chatMsgs = document.getElementById('chat-messages');
    chatIn.onkeydown = e => { if(e.key==='Enter' && chatIn.value.trim()){ db.ref('chat').push({msg: chatIn.value, t: Date.now()}); chatIn.value=''; } };
    db.ref('chat').limitToLast(3).on('child_added', s => {
        const m = document.createElement('div'); m.className='msg'; m.innerText=s.val().msg;
        chatMsgs.appendChild(m); setTimeout(()=>m.remove(), 5000);
    });

    function getP(cx, cy) { return { x: Math.floor((cx-offset.x)/zoom + W_SIZE/2), y: Math.floor((cy-offset.y)/zoom + W_SIZE/2) }; }
    function send(x, y) {
        if(Date.now()-lastDraw < 500 || x<0 || x>=W_SIZE || y<0 || y>=W_SIZE) return;
        lastDraw = Date.now();
        db.ref('canvas/'+x+'_'+y).set({x, y, color: selectedColor});
        const b = document.getElementById('cooldown'); b.style.transition='none'; b.style.width='100%';
        setTimeout(()=>{ b.style.transition='width 500ms linear'; b.style.width='0%'; }, 20);
    }

    let isD=false, isP=false, lD=0, lM={x:0,y:0};
    window.oncontextmenu = e => e.preventDefault();
    canvas.onmousedown = e => { if(e.button===0){isD=true; const p=getP(e.clientX,e.clientY); send(p.x,p.y);} else if(e.button===2)isP=true; };
    window.onmousemove = e => { 
        const p=getP(e.clientX,e.clientY); document.getElementById('coords').innerText=`${p.x}, ${p.y}`;
        if(isD)send(p.x,p.y); if(isP){offset.x+=e.movementX; offset.y+=e.movementY;}
    };
    canvas.ontouchstart = e => {
        if(e.touches.length===1){ isD=true; const p=getP(e.touches[0].clientX, e.touches[0].clientY); send(p.x,p.y); }
        else if(e.touches.length===2){ isP=true; isD=false; lD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); lM={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; }
    };
    window.ontouchmove = e => {
        e.preventDefault();
        if(isD && e.touches.length===1){ const p=getP(e.touches[0].clientX, e.touches[0].clientY); send(p.x,p.y); }
        else if(isP && e.touches.length===2){
            const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
            const m={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
            offset.x+=m.x-lM.x; offset.y+=m.y-lM.y; zoom=Math.min(Math.max(zoom*(d/lD),0.1),80); lD=d; lM=m;
        }
    };
    window.onmouseup = window.ontouchend = () => isD=isP=false;
    window.onwheel = e => zoom = Math.min(Math.max(zoom*(e.deltaY<0?1.2:0.8),0.1),80);

    function render() {
        canvas.width=window.innerWidth; canvas.height=window.innerHeight; ctx.imageSmoothingEnabled=false;
        ctx.fillStyle="#f0f0f0"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(offset.x,offset.y); ctx.scale(zoom,zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        if(zoom>20){ ctx.beginPath(); ctx.strokeStyle="rgba(0,0,0,0.05)"; ctx.lineWidth=0.01;
            for(let x=0;x<=W_SIZE;x++){ctx.moveTo(x-W_SIZE/2,-W_SIZE/2);ctx.lineTo(x-W_SIZE/2,W_SIZE/2);}
            for(let y=0;y<=W_SIZE;y++){ctx.moveTo(-W_SIZE/2,y-W_SIZE/2);ctx.lineTo(W_SIZE/2,y-W_SIZE/2);} ctx.stroke();
        } ctx.restore(); requestAnimationFrame(render);
    } render();
</script>
</body>
</html>
