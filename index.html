<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* ЖЕСТКАЯ БЛОКИРОВКА СКРОЛЛА */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; -webkit-user-select: none; 
        }

        canvas { display: block; image-rendering: pixelated; }

        /* ИНТЕРФЕЙС С ЗАКРУГЛЕНИЕМ (GLASSMORPHISM) */
        #ui { position: fixed; top: 15px; left: 15px; right: 15px; pointer-events: none; display: flex; justify-content: space-between; z-index: 100; }
        .panel { 
            background: rgba(0, 0, 0, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 10px 18px; 
            color: #fff; 
            pointer-events: auto; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-radius: 12px; 
            font-size: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* ЧАТ В НИЖНЕМ УГЛУ */
        #chat-container { position: fixed; bottom: 25px; left: 15px; width: 260px; pointer-events: auto; z-index: 1000; }
        #chat-input { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: #fff; 
            padding: 12px; 
            outline: none; 
            border-radius: 12px;
            font-size: 14px;
        }
        #chat-messages { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; pointer-events: none; }
        .msg { 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-size: 13px; 
            width: fit-content; 
            animation: fadeOut 6s forwards; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        input[type="color"] { width: 32px; height: 32px; border: 1px solid #fff; background: none; cursor: pointer; border-radius: 6px; padding: 0; }
        #cooldown { position: fixed; bottom: 0; left: 0; height: 4px; background: #00ff00; width: 0%; z-index: 1001; box-shadow: 0 0 10px #00ff00; }
        
        @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div id="cooldown"></div>

    <div id="ui">
        <div class="panel">
            <input type="color" id="colorPicker" value="#ffffff">
            <span id="coords">0, 0</span>
        </div>
        <div class="panel">ОНЛАЙН: <span id="online">1</span></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Написать..." maxlength="50">
    </div>

    <canvas id="canvas"></canvas>

<script>
    // ТВОЙ ОСНОВНОЙ КОНФИГУРАТОР
    const firebaseConfig = {
        apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
        authDomain: "doodle-102.firebaseapp.com",
        databaseURL: "https://doodle-102-default-rtdb.firebaseio.com",
        projectId: "doodle-102",
        storageBucket: "doodle-102.firebasestorage.app",
        messagingSenderId: "296542303637",
        appId: "1:296542303637:web:950b3cbe547c6d10f3f29c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas');
    const wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;

    world.width = world.height = W_SIZE;
    wctx.fillStyle = "#FFFFFF";
    wctx.fillRect(0, 0, W_SIZE, W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
    let lastDraw = 0;
    const CD_TIME = 500; // ПОЛСЕКУНДЫ КУЛДАУН

    // --- ЧАТ ---
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    chatInput.onkeydown = e => {
        if(e.key === 'Enter' && chatInput.value.trim() !== '') {
            db.ref('chat').push({ msg: chatInput.value, t: Date.now() });
            chatInput.value = '';
        }
    };

    db.ref('chat').limitToLast(4).on('child_added', s => {
        const d = s.val();
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerText = d.msg;
        chatMessages.appendChild(div);
        setTimeout(() => div.remove(), 6000);
    });

    // --- ФИКС ОНЛАЙНА ---
    const presenceRef = db.ref('presence');
    const myPresenceRef = presenceRef.push();
    db.ref('.info/connected').on('value', snap => {
        if (snap.val() === true) {
            myPresenceRef.set(true);
            myPresenceRef.onDisconnect().remove();
        }
    });
    presenceRef.on('value', s => {
        const count = s.numChildren();
        document.getElementById('online').innerText = count > 0 ? count : 1;
    });

    // --- РИСОВАНИЕ И СЕТКА ---
    db.ref('canvas').on('child_added', s => drawToBuffer(s.val()));
    db.ref('canvas').on('child_changed', s => drawToBuffer(s.val()));

    function drawToBuffer(p) {
        if(!p) return;
        wctx.fillStyle = p.color;
        wctx.fillRect(p.x, p.y, 1, 1);
    }

    function sendPixel(x, y) {
        const now = Date.now();
        if(now - lastDraw < CD_TIME || x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;
        lastDraw = now;
        const color = document.getElementById('colorPicker').value;
        const bar = document.getElementById('cooldown');
        bar.style.transition = 'none'; bar.style.width = '100%';
        db.ref('canvas/' + x + '_' + y).set({ x, y, color });
        setTimeout(() => { bar.style.transition = `width ${CD_TIME}ms linear`; bar.style.width = '0%'; }, 20);
    }

    function getP(cx, cy) {
        return {
            x: Math.floor((cx - offset.x) / zoom + W_SIZE/2),
            y: Math.floor((cy - offset.y) / zoom + W_SIZE/2)
        };
    }

    // --- УПРАВЛЕНИЕ (МЫШЬ И ТАЧ) ---
    let isDraw = false, isPan = false, lastD = 0, lastM = {x:0, y:0};
    window.oncontextmenu = e => e.preventDefault();

    canvas.onmousedown = e => { 
        if(e.button === 0) { isDraw = true; const p = getP(e.clientX, e.clientY); sendPixel(p.x, p.y); } 
        else if(e.button === 2) isPan = true;
    };
    
    window.onmousemove = e => {
        const p = getP(e.clientX, e.clientY);
        document.getElementById('coords').innerText = `${p.x}, ${p.y}`;
        if(isDraw) sendPixel(p.x, p.y);
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };

    canvas.addEventListener('touchstart', e => {
        if(e.touches.length === 1) {
            isDraw = true; const p = getP(e.touches[0].clientX, e.touches[0].clientY); sendPixel(p.x, p.y);
        } else if(e.touches.length === 2) {
            isPan = true; isDraw = false;
            lastD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            lastM = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        if(isDraw && e.touches.length === 1) {
            const p = getP(e.touches[0].clientX, e.touches[0].clientY); sendPixel(p.x, p.y);
        } else if(isPan && e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const m = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
            offset.x += m.x - lastM.x; offset.y += m.y - lastM.y;
            zoom = Math.min(Math.max(zoom * (d/lastD), 0.1), 80);
            lastD = d; lastM = m;
        }
    }, {passive: false});
    
    window.onmouseup = window.ontouchend = () => isDraw = isPan = false;
    window.onwheel = e => { zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.1), 80); };

    // --- РЕНДЕР ---
    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(offset.x, offset.y); ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        
        if(zoom > 20) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 0.02;
            for(let x=0; x<=W_SIZE; x++) { ctx.moveTo(x-W_SIZE/2, -W_SIZE/2); ctx.lineTo(x-W_SIZE/2, W_SIZE/2); }
            for(let y=0; y<=W_SIZE; y++) { ctx.moveTo(-W_SIZE/2, y-W_SIZE/2); ctx.lineTo(W_SIZE/2, y-W_SIZE/2); }
            ctx.stroke();
        }
        ctx.restore();
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
