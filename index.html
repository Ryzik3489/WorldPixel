<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #fff; 
            font-family: sans-serif; touch-action: none; -webkit-user-select: none; 
        }
        canvas { display: block; image-rendering: pixelated; }

        /* МИНИМАЛИСТИЧНЫЙ ИНТЕРФЕЙС */
        #ui-top { position: fixed; top: 15px; left: 15px; right: 15px; pointer-events: none; z-index: 1000; display: flex; justify-content: space-between; align-items: flex-start; }
        
        .panel { 
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); 
            padding: 6px 12px; border-radius: 10px; backdrop-filter: blur(10px);
            pointer-events: auto; font-size: 13px; font-weight: bold; color: #000;
            display: flex; gap: 12px; align-items: center;
        }

        /* РОДНАЯ ПАЛИТРА */
        input[type="color"] {
            width: 30px; height: 30px; border: none; background: none; cursor: pointer; padding: 0;
            -webkit-appearance: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; }

        /* ЧАТ */
        #chat-container { position: fixed; bottom: 20px; left: 15px; width: 240px; pointer-events: auto; z-index: 1000; }
        #chat-input { width: 100%; background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.1); padding: 10px; border-radius: 10px; outline: none; font-size: 13px; }
        #chat-messages { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; pointer-events: none; }
        .msg { background: rgba(255,255,255,0.8); padding: 4px 8px; border-radius: 6px; font-size: 11px; border: 1px solid rgba(0,0,0,0.05); animation: fO 5s forwards; width: fit-content; }
        
        #cooldown { position: fixed; bottom: 0; left: 0; height: 3px; background: #000; width: 0%; z-index: 1001; }
        @keyframes fO { 0%, 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-3px); } }
    </style>
</head>
<body>
    <div id="cooldown"></div>
    
    <div id="ui-top">
        <div class="panel">
            <input type="color" id="colorPicker" value="#ff0000">
            <span id="coords">0, 0</span>
        </div>
        <div class="panel">ОНЛАЙН: <span id="online">1</span></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="50">
    </div>

    <canvas id="canvas"></canvas>

<script>
    const config = { apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM", databaseURL: "https://doodle-102-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas'), wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;
    world.width = world.height = W_SIZE; wctx.fillStyle = "#fff"; wctx.fillRect(0,0,W_SIZE,W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 }, lastDraw = 0;
    const colorInput = document.getElementById('colorPicker');

    // БАЗА ДАННЫХ
    db.ref('canvas').on('child_added', s => { const p = s.val(); if(p){ wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); } });
    db.ref('canvas').on('child_changed', s => { const p = s.val(); if(p){ wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); } });
    
    const myPres = db.ref('presence').push();
    db.ref('.info/connected').on('value', s => { if(s.val()){ myPres.set(true); myPres.onDisconnect().remove(); } });
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren() || 1);

    // ЧАТ
    const chatIn = document.getElementById('chat-input'), chatMsgs = document.getElementById('chat-messages');
    chatIn.onkeydown = e => { if(e.key==='Enter' && chatIn.value.trim()){ db.ref('chat').push({msg: chatIn.value, t: Date.now()}); chatIn.value=''; } };
    db.ref('chat').limitToLast(3).on('child_added', s => {
        const m = document.createElement('div'); m.className='msg'; m.innerText=s.val().msg;
        chatMsgs.appendChild(m); setTimeout(()=>m.remove(), 5000);
    });

    function getP(cx, cy) { return { x: Math.floor((cx-offset.x)/zoom + W_SIZE/2), y: Math.floor((cy-offset.y)/zoom + W_SIZE/2) }; }
    
    function send(x, y) {
        if(Date.now()-lastDraw < 500 || x<0 || x>=W_SIZE || y<0 || y>=W_SIZE) return;
        lastDraw = Date.now();
        db.ref('canvas/'+x+'_'+y).set({x, y, color: colorInput.value});
        const b = document.getElementById('cooldown'); b.style.transition='none'; b.style.width='100%';
        setTimeout(()=>{ b.style.transition='width 500ms linear'; b.style.width='0%'; }, 20);
    }

    // УПРАВЛЕНИЕ ДЛЯ ТЕЛЕФОНА
    let isPan = false, lastT = {x:0, y:0}, startT = {x:0, y:0}, startTime = 0, lastD = 0;

    canvas.addEventListener('touchstart', e => {
        startTime = Date.now();
        if(e.touches.length === 1) {
            startT = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            lastT = { ...startT }; isPan = true;
        } else if(e.touches.length === 2) {
            lastD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length === 1 && isPan) {
            const t = e.touches[0];
            offset.x += t.clientX - lastT.x; offset.y += t.clientY - lastT.y;
            lastT = { x: t.clientX, y: t.clientY };
        } else if(e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            zoom = Math.min(Math.max(zoom * (d/lastD), 0.1), 80); lastD = d;
        }
    }, {passive: false});

    window.addEventListener('touchend', e => {
        const dist = Math.hypot(lastT.x - startT.x, lastT.y - startT.y);
        if(Date.now() - startTime < 150 && dist < 10) {
            const p = getP(startT.x, startT.y); send(p.x, p.y);
        }
        isPan = false;
    });

    // МЫШКА
    window.oncontextmenu = e => e.preventDefault();
    canvas.onmousedown = e => { if(e.button===0) { const p=getP(e.clientX, e.clientY); send(p.x, p.y); } else if(e.button===2) isPan=true; };
    window.onmousemove = e => { 
        const p=getP(e.clientX, e.clientY); document.getElementById('coords').innerText=`${p.x}, ${p.y}`;
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };
    window.onmouseup = () => isPan = false;
    window.onwheel = e => zoom = Math.min(Math.max(zoom*(e.deltaY<0?1.2:0.8),0.1),80);

    function render() {
        canvas.width=window.innerWidth; canvas.height=window.innerHeight; ctx.imageSmoothingEnabled=false;
        ctx.fillStyle="#f5f5f5"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(offset.x,offset.y); ctx.scale(zoom,zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        if(zoom>20){ ctx.beginPath(); ctx.strokeStyle="rgba(0,0,0,0.05)"; ctx.lineWidth=0.01;
            for(let x=0;x<=W_SIZE;x++){ctx.moveTo(x-W_SIZE/2,-W_SIZE/2);ctx.lineTo(x-W_SIZE/2,W_SIZE/2);}
            for(let y=0;y<=W_SIZE;y++){ctx.moveTo(-W_SIZE/2,y-W_SIZE/2);ctx.lineTo(W_SIZE/2,y-W_SIZE/2);} ctx.stroke();
        } ctx.restore(); requestAnimationFrame(render);
    } render();
</script>
</body>
</html>
