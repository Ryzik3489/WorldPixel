<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorldPixel | Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* Экран загрузки и входа */
        #overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0f0;
        }
        .btn { 
            background: #0f0; color: #000; border: none; padding: 15px 30px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        
        /* Интерфейс */
        #ui { position: fixed; top: 10px; left: 10px; right: 10px; pointer-events: none; display: flex; justify-content: space-between; z-index: 100; }
        .panel { background: rgba(0,0,0,0.85); border: 1px solid #0f0; padding: 8px; color: #0f0; pointer-events: auto; }
        input[type="color"] { width: 40px; height: 40px; border: 1px solid #0f0; background: none; vertical-align: middle; }
        
        #cooldown { position: fixed; bottom: 0; left: 0; height: 4px; background: #0f0; width: 0%; z-index: 1001; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="status-text">INITIALIZING...</h1>
        <button id="btn-auth" class="btn hidden">LOGIN TO DRAW</button>
    </div>

    <div id="cooldown"></div>

    <div id="ui" class="hidden">
        <div class="panel">
            <input type="color" id="colorPicker" value="#000000">
            <span id="coords">0,0</span>
        </div>
        <div class="panel">📡 <span id="online">0</span></div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const config = {
        apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
        authDomain: "doodle-102.firebaseapp.com",
        projectId: "doodle-102",
        databaseURL: "https://doodle-102-default-rtdb.firebaseio.com",
        appId: "1:296542303637:web:950b3cbe547c6d10f3f29c"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    const auth = firebase.auth();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas');
    const wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;

    world.width = world.height = W_SIZE;
    wctx.fillStyle = "#FFFFFF";
    wctx.fillRect(0, 0, W_SIZE, W_SIZE);

    let zoom = 4.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
    let user = null, lastDraw = 0;

    // СИСТЕМА ВХОДА (REDIRECT для мобилок)
    const btnAuth = document.getElementById('btn-auth');
    const statusText = document.getElementById('status-text');

    btnAuth.onclick = () => auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            startApp();
        } else {
            statusText.innerText = "WORLD_PIXEL_V10";
            btnAuth.classList.remove('hidden');
        }
    });

    function startApp() {
        // Загружаем данные и слушаем обновления
        const canvasRef = db.ref('canvas');
        
        // Быстрая отрисовка изменений
        canvasRef.on('child_added', s => drawToBuffer(s.val()));
        canvasRef.on('child_changed', s => drawToBuffer(s.val()));
        
        // Онлайн статус
        const presence = db.ref('presence').push(true);
        presence.onDisconnect().remove();
        db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren());

        // Авто-реконнект если пропал инет
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === false) console.log("Lost connection...");
        });
    }

    function drawToBuffer(p) {
        if(!p) return;
        wctx.fillStyle = p.color;
        wctx.fillRect(p.x, p.y, 1, 1);
    }

    function send(x, y) {
        if(!user || Date.now() - lastDraw < 1000) return;
        if(x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;

        const color = document.getElementById('colorPicker').value;
        db.ref('canvas/' + x + '_' + y).set({
            x, y, color, t: firebase.database.ServerValue.TIMESTAMP
        });
        
        lastDraw = Date.now();
        const bar = document.getElementById('cooldown');
        bar.style.transition = 'none'; bar.style.width = '100%';
        setTimeout(() => { bar.style.transition = 'width 1s linear'; bar.style.width = '0%'; }, 50);
    }

    // УПРАВЛЕНИЕ
    let isDraw = false, isPan = false, lastD = 0, lastM = {x:0, y:0};

    function getP(cx, cy) {
        return {
            x: Math.floor((cx - offset.x) / zoom + W_SIZE/2),
            y: Math.floor((cy - offset.y) / zoom + W_SIZE/2)
        };
    }

    // Тач (Телефон)
    canvas.addEventListener('touchstart', e => {
        if(e.touches.length === 1) {
            isDraw = true; const p = getP(e.touches[0].clientX, e.touches[0].clientY); send(p.x, p.y);
        } else if(e.touches.length === 2) {
            isPan = true; isDraw = false;
            lastD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            lastM = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        if(isDraw && e.touches.length === 1) {
            const p = getP(e.touches[0].clientX, e.touches[0].clientY); send(p.x, p.y);
        } else if(isPan && e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const m = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
            offset.x += m.x - lastM.x; offset.y += m.y - lastM.y;
            zoom = Math.min(Math.max(zoom * (d/lastD), 0.1), 60);
            lastD = d; lastM = m;
        }
    }, {passive: false});

    // Мышь (ПК)
    canvas.onmousedown = e => { if(e.button===0) isDraw = true; else isPan = true; };
    window.onmousemove = e => {
        const p = getP(e.clientX, e.clientY);
        document.getElementById('coords').innerText = p.x + "," + p.y;
        if(isDraw) send(p.x, p.y);
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };
    window.onmouseup = window.ontouchend = () => { isDraw = isPan = false; };
    window.onwheel = e => { zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.1), 60); };

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(offset.x, offset.y);
        ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        ctx.restore();
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
