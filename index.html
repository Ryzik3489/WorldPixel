<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxPixel - Mobile & PC</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0e0e0e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; background: #fff; }
        
        #hud {
            position: fixed; top: 10px; left: 10px; right: 10px; pointer-events: none;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .panel {
            background: rgba(0, 0, 0, 0.8); padding: 8px 12px; border: 1px solid #0f0;
            pointer-events: auto; color: #0f0; border-radius: 5px; font-size: 12px;
        }
        #controls { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { border: 1px solid #0f0; width: 30px; height: 30px; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="controls" class="panel">
            <input type="color" id="colorPicker" value="#000000">
            <span id="coords">X:0 Y:0</span>
        </div>
        <div id="online-stat" class="panel">● ONLINE: <span id="online-count">0</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
            authDomain: "doodle-102.firebaseapp.com",
            projectId: "doodle-102",
            databaseURL: "https://doodle-102-default-rtdb.firebaseio.com",
            storageBucket: "doodle-102.firebasestorage.app",
            appId: "1:296542303637:web:950b3cbe547c6d10f3f29c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const pixelsRef = db.ref('canvas');
        const presenceRef = db.ref('presence');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const colorPicker = document.getElementById('colorPicker');

        const P_SIZE = 8; 
        const WORLD_SIZE = 1000;
        let zoom = 1.0;
        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };

        const world = document.createElement('canvas');
        world.width = WORLD_SIZE;
        world.height = WORLD_SIZE;
        const wctx = world.getContext('2d');
        wctx.fillStyle = "white";
        wctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // ОНЛАЙН
        const myPresence = presenceRef.push(true);
        myPresence.onDisconnect().remove();
        presenceRef.on('value', s => { document.getElementById('online-count').innerText = s.numChildren(); });

        // СИНХРОНИЗАЦИЯ
        pixelsRef.on('child_added', s => {
            const d = s.val();
            wctx.fillStyle = d.color;
            wctx.fillRect(d.x, d.y, 1, 1);
        });

        function sendPixel(x, y) {
            if (x < 0 || x >= WORLD_SIZE || y < 0 || y >= WORLD_SIZE) return;
            db.ref('canvas/' + x + '_' + y).set({ x, y, color: colorPicker.value });
        }

        // УПРАВЛЕНИЕ (PC + MOBILE)
        let isDrawing = false;
        let lastTouchDist = 0;

        function getPos(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = Math.floor(((clientX - offset.x) / zoom) / P_SIZE + WORLD_SIZE/2);
            const y = Math.floor(((clientY - offset.y) / zoom) / P_SIZE + WORLD_SIZE/2);
            return { x, y, clientX, clientY };
        }

        const handleStart = e => {
            if (e.touches && e.touches.length > 1) return; // Зум двумя пальцами
            isDrawing = true;
            const p = getPos(e);
            sendPixel(p.x, p.y);
        };

        const handleMove = e => {
            const p = getPos(e);
            document.getElementById('coords').innerText = `X:${p.x} Y:${p.y}`;

            if (isDrawing && (!e.touches || e.touches.length === 1)) {
                sendPixel(p.x, p.y);
            }
            
            // Перемещение (зажатая кнопка мыши или два пальца)
            if (e.buttons === 2 || (e.touches && e.touches.length === 2)) {
                // Упрощенное перемещение для примера
                offset.x += e.movementX || 0;
                offset.y += e.movementY || 0;
            }
        };

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('touchstart', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);

        // Зум колесиком
        window.addEventListener('wheel', e => {
            zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
        }, {passive: false});

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(zoom * P_SIZE, zoom * P_SIZE);
            ctx.drawImage(world, -WORLD_SIZE/2, -WORLD_SIZE/2);
            ctx.restore();
            requestAnimationFrame(render);
        }
        render();
        canvas.oncontextmenu = () => false;
    </script>
</body>
</html>
